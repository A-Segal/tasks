<div class="hero-section">

  <div class="glass-card">

    <div class="email-circle">
      <span>{{ email }}</span>
    </div>

    <h1 class="title">{{ hd.name }}</h1>

    <div class="buttons">
      <button (click)="setName()" class="btn">👩‍💻 מי אני</button>
      <button (click)="showPhone()" class="btn">📞 טלפון</button>
      <button (click)="showSkills()" class="btn">📄 כישורים</button>
      <button (click)="resetInfo()" class="btn">🔄 איפוס</button>
      <button (click)="gotoTasks()" class="btn project">🚀 צפייה בפרוייקט</button>
    </div>

    <div class="info-card" *ngIf="hd.text">
      <h3>יכולות</h3>
      <p>{{ hd.text }}</p>
    </div>

    <div class="phone-card" *ngIf="hd.phon">
      <h3>יצירת קשר</h3>
      <p>{{ hd.phon }}</p>
    </div>

    <div class="signature-container">
      <div class="signature">
        Aidy Segal Fullstack Developer
      </div>
    </div>

  </div>

</div>
