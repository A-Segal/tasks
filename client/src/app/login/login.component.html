<div></div>
<div class="alldiv">
<form class="form" [formGroup]="formGroup" (ngSubmit)="login()">
  <div class="labelinput">
<label for="userName">userName</label>
<input
type="text"
id="userName"
class=""
formControlName="userName"
required
placeholder="waiting to your userName"
>

<span class="error"
   *ngIf="formGroup.get('userName')?.invalid && mouseLogin"
   [innerText]="'!!חובה למלא שדה זה'"></span>

  


  </div>
  <div class="labelinput">
<label for="password">password</label>
<input
type="password"
id="password"
class=""
formControlName="password"
required
placeholder="waiting to your password">





<span  class="error"
   *ngIf="formGroup.get('password')?.invalid && mouseLogin"
   [innerText]="'!!חובה למלא שדה זה'"></span>

  </div>
  <div (mouseenter)="mouseLogin=true"
  (mouseleave)="mouseLogin=false">  


    <!-- <button  class="butt" [disabled]="formGroup.invalid" (click)="login()">login</button> -->
     <button type="submit" class="butt" [disabled]="formGroup.invalid">login</button> 
  </div>  
   


</form>
</div>
